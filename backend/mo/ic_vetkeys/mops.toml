[package]
name = "ic-vetkeys"
version = "0.4.0"
repository = "https://github.com/dfinity/vetkeys/backend/mo/ic_vetkeys"
description = "A set of tools designed to help canister developers integrate vetKeys into their Internet Computer (ICP) applications"
keywords = [
  "vetkeys",
  "vetkd",
  "encryption",
  "privacy",
  "signature",
  "bls",
  "key-derivation",
  "ibe"
]
license = "Apache-2.0"

[toolchain]
moc = "1.6.0"

[moc]
args = [ "-W=M0236,M0237,M0223" ]

[dependencies]
core = "2.4.0"

[dev-dependencies]
test = "2.1.1"
