canisters:
  - name: basic_ibe
    recipe:
      type: "@dfinity/rust@v3.2.0"
      configuration:
        package: ic-vetkd-example-basic-ibe-backend
        candid: backend/backend.did
    init_args:
      type: text
      value: "(\"test_key_1\")"

  - name: www
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        dir: frontend/dist
        build:
          - cd frontend && npm i --include=dev && npm run build

networks:
  - name: local
    mode: managed
    ii: true
