canisters:
  - name: basic_ibe
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: backend/src/Main.mo
        args: --enhanced-orthogonal-persistence
    init_args:
      type: text
      value: "(\"test_key_1\")"

  - name: www
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        dir: frontend/dist
        build:
          - cd frontend && npm i --include=dev && npm run build

networks:
  - name: local
    mode: managed
    ii: true
