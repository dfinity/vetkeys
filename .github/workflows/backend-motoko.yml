name: Backend Motoko Tests

permissions: {}

on:
  push:
    branches:
      - main
      - master
  pull_request:
    paths:
      - backend/mo/**
      - backend/rs/canisters/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/provision-frontend-linux.sh
      - .github/workflows/provision-frontend-darwin.sh
      - .github/workflows/backend-motoko.yml

jobs:
  backend-motoko-tests-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - uses: ZenVoich/setup-mops@3e94e453352269b34137b5ce49f09a8df81bed7d # v1.4.1
        with:
          mops-version: 1
      - name: Provision Linux
        run: bash .github/workflows/provision-frontend-linux.sh
      - name: Run MOPS Test Linux
        run: |
          set -eExuo pipefail
          cd backend/mo/ic_vetkeys
          mops install
          mops test
          cd ../canisters/ic_vetkeys_manager_canister
          make test
          cd ../ic_vetkeys_encrypted_maps_canister
          make test
  backend-motoko-tests-darwin:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - uses: ZenVoich/setup-mops@3e94e453352269b34137b5ce49f09a8df81bed7d # v1.4.1
        with:
          mops-version: 1
      - name: Provision Darwin
        run: bash .github/workflows/provision-frontend-darwin.sh
      - name: Run MOPS Test Darwin
        run: |
          set -eExuo pipefail
          cd backend/mo/ic_vetkeys
          mops install
          mops test
          cd ../canisters/ic_vetkeys_manager_canister
          make test
          cd ../ic_vetkeys_encrypted_maps_canister
          make test
