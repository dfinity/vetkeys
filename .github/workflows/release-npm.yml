name: release-npm

on:
  push:
    tags:
      - 'npm/[0-9]+.[0-9]+.[0-9]+'
      - 'npm/[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build and pack but do not publish to npm or create a GitHub release"
        required: false
        default: true
        type: boolean

jobs:
  release:
    name: release-npm
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://www.npmjs.com/package/@icp-sdk/vetkeys
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup PNPM
        uses: dfinity/ci-tools/actions/setup-pnpm@main

      - name: Determine version
        id: ver
        run: |
          if [[ "$GITHUB_REF_NAME" == npm/* ]]; then
            VERSION="${GITHUB_REF_NAME#npm/}"
          else
            VERSION=$(jq -r '.version' frontend/ic_vetkeys/package.json)
          fi
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3 | cut -d- -f1)
          echo "major_minor_patch=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-beta.* ]]; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
          fi

      - name: Build NPM package
        run: pnpm build

      - name: Pack
        working-directory: frontend/ic_vetkeys
        run: pnpm pack

      - name: Publish to npm
        if: ${{ github.event.inputs.dry-run != 'true' }}
        working-directory: frontend/ic_vetkeys
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          release_cmd="pnpm publish --verbose --access public --no-git-checks"
          if [ "${{ steps.ver.outputs.is_beta }}" = 'true' ]; then
            release_cmd="$release_cmd --tag beta"
          fi
          $release_cmd

      - name: Extract release notes from CHANGELOG
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          awk '/^## \[/{count++; if(count==2){exit}} count==1{print}' \
            frontend/ic_vetkeys/CHANGELOG.md > RELEASE_NOTES.md

      - name: Create Github release
        if: ${{ github.event.inputs.dry-run != 'true' }}
        uses: ncipollo/release-action@v1.16.0
        with:
          artifacts: 'frontend/ic_vetkeys/icp-sdk-vetkeys-${{ steps.ver.outputs.major_minor_patch }}.tgz'
          bodyFile: 'RELEASE_NOTES.md'
          tag: '${{ github.ref_name }}'
          commit: 'main'
          prerelease: ${{ steps.ver.outputs.is_beta == 'true' }}
          makeLatest: ${{ steps.ver.outputs.is_beta == 'false' }}
