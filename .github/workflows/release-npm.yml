name: release-npm

on:
  push:
    tags:
      - 'npm/[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run pnpm publish --dry-run"
        required: false
        default: true
        type: boolean

jobs:
  release:
    name: release-npm
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://www.npmjs.com/package/@icp-sdk/vetkeys
    permissions:
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Check package version matches tag
        if: ${{ github.event_name == 'push' }}
        run: |
          set -euo pipefail
          pkg_version=$(jq -r '.version' frontend/ic_vetkeys/package.json)
          tag_version="${GITHUB_REF_NAME#npm/}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "Version mismatch: package.json has $pkg_version but tag is npm/$tag_version"
            exit 1
          fi

      - name: Build NPM package
        run: pnpm build

      - name: Audit dependencies
        working-directory: frontend/ic_vetkeys
        run: pnpm audit

      - name: Pack
        working-directory: frontend/ic_vetkeys
        run: pnpm pack

      - name: Publish to npm
        working-directory: frontend/ic_vetkeys
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          if [ "${{ github.event.inputs.dry-run }}" = 'true' ]; then
            pnpm publish --verbose --access public --no-git-checks --dry-run
          else
            pnpm publish --verbose --access public --no-git-checks
          fi
